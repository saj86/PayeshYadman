version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-payeshyadman}
      POSTGRES_USER: ${POSTGRES_USER:-payesh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payesh123}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-payesh} -d ${POSTGRES_DB:-payeshyadman}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-payesh}:${POSTGRES_PASSWORD:-payesh123}@postgres:5432/${POSTGRES_DB:-payeshyadman}
      REDIS_URL: redis://redis:${REDIS_PORT:-6379}
      NODE_ENV: ${NODE_ENV:-production}
      API_PORT: ${API_PORT:-3001}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - '${API_PORT:-3001}:3001'
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}
    depends_on:
      - api
    env_file:
      - .env
    ports:
      - '${WEB_PORT:-3000}:3000'
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  uploads:
